<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" stroke="currentColor" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Fole expandido zig-zag, teclas brancas, linha grossa -->
  <!-- Left body -->
  <rect x="10" y="20" width="20" height="60" fill="currentColor" />
  <!-- Keys on left -->
  <rect x="20" y="25" width="10" height="10" fill="white" />
  <rect x="20" y="40" width="10" height="10" fill="white" />
  <rect x="20" y="55" width="10" height="10" fill="white" />
  <!-- Right body (keyboard) -->
  <rect x="70" y="20" width="20" height="60" fill="currentColor" />
  <!-- Piano keys on right -->
  <line x1="75" y1="20" x2="75" y2="80" stroke="white" stroke-width="2" />
  <line x1="80" y1="20" x2="80" y2="80" stroke="white" stroke-width="2" />
  <line x1="85" y1="20" x2="85" y2="80" stroke="white" stroke-width="2" />
  <!-- Bellows (fole) -->
  <path d="M30,30 L40,25 L50,30 L60,25 L70,30" />
  <path d="M30,40 L40,35 L50,40 L60,35 L70,40" />
  <path d="M30,50 L40,45 L50,50 L60,45 L70,50" />
  <path d="M30,60 L40,55 L50,60 L60,55 L70,60" />
  <path d="M30,70 L40,65 L50,70 L60,65 L70,70" />
  <line x1="30" y1="30" x2="30" y2="70" />
  <line x1="70" y1="30" x2="70" y2="70" />
</svg>
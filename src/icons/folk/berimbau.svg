<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Arco madeira, corda fina, cabaça, baqueta, xilo -->
  <!-- Wooden bow (arco) -->
  <path d="M40,5 C20,30 20,70 40,95" stroke-width="6" />
  <!-- Wire (arame) -->
  <line x1="40" y1="5" x2="40" y2="95" stroke-width="2" />
  <!-- Gourd (cabaça) -->
  <circle cx="35" cy="75" r="15" stroke-width="5" />
  <circle cx="35" cy="75" r="5" stroke-width="2" />
  <!-- Stick (baqueta) -->
  <line x1="15" y1="60" x2="65" y2="60" stroke-width="4" />
  <!-- Coin/stone (dobrão) -->
  <circle cx="50" cy="50" r="4" fill="currentColor" stroke="none" />
</svg>
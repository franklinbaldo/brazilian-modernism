<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" stroke="currentColor" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Estandarte triangular, franja, moldura, hastes -->
  <!-- Top pole (haste transversal) -->
  <line x1="10" y1="20" x2="90" y2="20" stroke-width="6" />
  <!-- Finials -->
  <circle cx="10" cy="20" r="5" fill="currentColor" />
  <circle cx="90" cy="20" r="5" fill="currentColor" />
  <!-- Vertical pole -->
  <line x1="50" y1="5" x2="50" y2="20" stroke-width="6" />
  <!-- Main banner body (triangular base) -->
  <polygon points="20,20 80,20 80,60 50,80 20,60" fill="currentColor" />
  <!-- Inner decorative frame -->
  <polygon points="30,30 70,30 70,55 50,70 30,55" stroke="white" stroke-width="3" />
  <!-- Central emblem (e.g. crown or lion abstraction) -->
  <path d="M40,40 L45,50 L50,40 L55,50 L60,40 L60,55 L40,55 Z" fill="white" stroke="none" />
  <!-- Fringe (franjas) -->
  <line x1="25" y1="64" x2="25" y2="90" />
  <line x1="35" y1="71" x2="35" y2="90" />
  <line x1="45" y1="77" x2="45" y2="90" />
  <line x1="55" y1="77" x2="55" y2="90" />
  <line x1="65" y1="71" x2="65" y2="90" />
  <line x1="75" y1="64" x2="75" y2="90" />
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" stroke="currentColor" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Cabeça com olhos esbugalhados, dentes expostos, sombra hachuras -->
  <!-- Outer shape (hair/mane) -->
  <path d="M50,5 C30,5 10,20 15,50 C10,70 20,95 50,95 C80,95 90,70 85,50 C90,20 70,5 50,5 Z" fill="currentColor" />
  <!-- Face area (white) -->
  <path d="M50,15 C35,15 25,25 25,50 C25,75 35,85 50,85 C65,85 75,75 75,50 C75,25 65,15 50,15 Z" fill="white" />
  <!-- Eyes -->
  <circle cx="35" cy="40" r="8" fill="white" />
  <circle cx="65" cy="40" r="8" fill="white" />
  <circle cx="35" cy="40" r="3" fill="currentColor" />
  <circle cx="65" cy="40" r="3" fill="currentColor" />
  <!-- Nose -->
  <path d="M50,45 L45,60 L55,60 Z" fill="currentColor" />
  <!-- Mouth with teeth -->
  <path d="M30,70 Q50,60 70,70 Q50,80 30,70 Z" fill="white" />
  <line x1="40" y1="65" x2="40" y2="75" />
  <line x1="50" y1="63" x2="50" y2="77" />
  <line x1="60" y1="65" x2="60" y2="75" />
  <!-- Hatching for texture -->
  <path d="M25,25 L35,35 M75,25 L65,35 M20,50 L30,50 M80,50 L70,50" />
</svg>
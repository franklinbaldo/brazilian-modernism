<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" stroke="currentColor" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Estrela 6-pontas, flor 4-pétalas, 2 linhas, carimbo de capa -->
  <!-- Outer border (carimbo feel) -->
  <circle cx="50" cy="50" r="45" stroke-width="6" stroke-dasharray="10,5" />
  <!-- 6-pointed star -->
  <polygon points="50,15 60,35 80,35 65,50 70,70 50,60 30,70 35,50 20,35 40,35" />
  <polygon points="50,85 40,65 20,65 35,50 30,30 50,40 70,30 65,50 80,65 60,65" />
  <!-- Inner 4-petal flower -->
  <path d="M50,40 C60,40 60,50 50,50 C40,50 40,40 50,40 Z" fill="currentColor" />
  <path d="M50,50 C60,50 60,60 50,60 C40,60 40,50 50,50 Z" fill="currentColor" />
  <path d="M40,50 C40,40 50,40 50,50 C50,60 40,60 40,50 Z" fill="currentColor" />
  <path d="M50,50 C50,40 60,40 60,50 C60,60 50,60 50,50 Z" fill="currentColor" />
  <!-- Center dot -->
  <circle cx="50" cy="50" r="3" fill="white" />
</svg>
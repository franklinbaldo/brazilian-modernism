<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Pipa (Kite) with xilogravura irregular lines -->

  <!-- Main body -->
  <polygon points="50,10 80,40 50,70 20,40" />

  <!-- Cross structure -->
  <line x1="50" y1="10" x2="50" y2="70" />
  <line x1="20" y1="40" x2="80" y2="40" />

  <!-- Tail -->
  <polyline points="50,70 40,80 60,90 50,100" stroke-width="3" />
</svg>

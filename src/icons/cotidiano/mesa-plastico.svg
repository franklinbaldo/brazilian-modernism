<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Perna trás esquerda -->
  <path d="M 25 45 L 20 85" fill="none" stroke="#1A1814" stroke-width="6" stroke-linecap="round"/>
  <!-- Perna trás direita -->
  <path d="M 75 45 L 70 85" fill="none" stroke="#1A1814" stroke-width="6" stroke-linecap="round"/>

  <!-- Tampo -->
  <path d="M 15 45 L 35 30 L 85 30 L 65 45 Z" fill="#FBF8F1" stroke="#1A1814" stroke-width="4" stroke-linejoin="round"/>
  <!-- Borda do tampo (espessura) -->
  <path d="M 15 45 L 65 45 L 65 50 L 15 50 Z" fill="#E6E0D4" stroke="#1A1814" stroke-width="4" stroke-linejoin="round"/>
  <path d="M 65 45 L 85 30 L 85 35 L 65 50 Z" fill="#E6E0D4" stroke="#1A1814" stroke-width="4" stroke-linejoin="round"/>

  <!-- Perna frente esquerda -->
  <path d="M 25 50 L 25 90" fill="none" stroke="#1A1814" stroke-width="6" stroke-linecap="round"/>
  <!-- Perna frente direita -->
  <path d="M 60 50 L 60 90" fill="none" stroke="#1A1814" stroke-width="6" stroke-linecap="round"/>

  <!-- Sombras base pernas (detalhe mínimo) -->
  <ellipse cx="25" cy="92" rx="4" ry="2" fill="#1A1814" opacity="0.2"/>
  <ellipse cx="60" cy="92" rx="4" ry="2" fill="#1A1814" opacity="0.2"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Barra horizontal conectora inferior -->
  <line x1="15" y1="70" x2="85" y2="70" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>

  <!-- Pernas comuns -->
  <line x1="15" y1="70" x2="15" y2="90" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <line x1="85" y1="70" x2="85" y2="90" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <line x1="40" y1="70" x2="40" y2="90" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="70" x2="60" y2="90" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>

  <!-- Cadeira 1 -->
  <!-- Encosto -->
  <rect x="15" y="25" width="20" height="25" rx="2" fill="#1B2B4B" stroke="currentColor" stroke-width="3"/>
  <!-- Suporte encosto -->
  <line x1="25" y1="50" x2="25" y2="55" stroke="currentColor" stroke-width="4"/>
  <!-- Assento -->
  <rect x="15" y="55" width="20" height="10" rx="2" fill="#1B2B4B" stroke="currentColor" stroke-width="3"/>
  <!-- Suporte assento para barra -->
  <line x1="25" y1="65" x2="25" y2="70" stroke="currentColor" stroke-width="4"/>

  <!-- Cadeira 2 -->
  <rect x="40" y="25" width="20" height="25" rx="2" fill="#1B2B4B" stroke="currentColor" stroke-width="3"/>
  <line x1="50" y1="50" x2="50" y2="55" stroke="currentColor" stroke-width="4"/>
  <rect x="40" y="55" width="20" height="10" rx="2" fill="#1B2B4B" stroke="currentColor" stroke-width="3"/>
  <line x1="50" y1="65" x2="50" y2="70" stroke="currentColor" stroke-width="4"/>

  <!-- Cadeira 3 -->
  <rect x="65" y="25" width="20" height="25" rx="2" fill="#1B2B4B" stroke="currentColor" stroke-width="3"/>
  <line x1="75" y1="50" x2="75" y2="55" stroke="currentColor" stroke-width="4"/>
  <rect x="65" y="55" width="20" height="10" rx="2" fill="#1B2B4B" stroke="currentColor" stroke-width="3"/>
  <line x1="75" y1="65" x2="75" y2="70" stroke="currentColor" stroke-width="4"/>
</svg>

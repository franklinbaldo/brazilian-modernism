<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g transform="rotate(-15 50 50)">
    <circle cx="50" cy="50" r="40" fill="none" stroke="#C8472E" stroke-width="4"/>
    <circle cx="50" cy="50" r="34" fill="none" stroke="#C8472E" stroke-width="2" stroke-dasharray="6 3"/>

    <!-- Texto Curvo (Símulação simplificada usando text-anchor) -->
    <path id="curve" d="M 20 50 A 30 30 0 0 1 80 50" fill="transparent" />
    <text font-family="sans-serif" font-weight="bold" font-size="12" fill="#C8472E" letter-spacing="2">
      <textPath href="#curve" startOffset="50%" text-anchor="middle">RECEBIDO</textPath>
    </text>

    <!-- Data e Linhas -->
    <line x1="25" y1="52" x2="75" y2="52" stroke="#C8472E" stroke-width="2"/>
    <text x="50" y="65" font-family="monospace" font-weight="bold" font-size="10" fill="#C8472E" text-anchor="middle">24 MAI 2024</text>
    <line x1="25" y1="69" x2="75" y2="69" stroke="#C8472E" stroke-width="2"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Perna traseira esquerda -->
  <line x1="35" y1="50" x2="25" y2="90" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <!-- Perna traseira direita -->
  <line x1="65" y1="50" x2="75" y2="90" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>

  <!-- Assento -->
  <path d="M 25 50 L 75 50 L 80 55 L 20 55 Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>

  <!-- Perna frontal esquerda -->
  <line x1="25" y1="55" x2="30" y2="90" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <!-- Perna frontal direita -->
  <line x1="75" y1="55" x2="70" y2="90" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>

  <!-- Encosto -->
  <path d="M 30 50 L 35 15 C 35 10, 65 10, 65 15 L 70 50" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>

  <!-- Ranhuras do encosto -->
  <line x1="33" y1="25" x2="67" y2="25" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="35" x2="68" y2="35" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <line x1="31" y1="45" x2="69" y2="45" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Corpo da lombada (vista de lado) -->
  <rect x="25" y="10" width="30" height="80" fill="#1B2B4B" stroke="#1A1814" stroke-width="3" rx="2"/>
  <!-- Capa lateral perspectiva -->
  <path d="M 55 10 L 80 15 L 80 85 L 55 90 Z" fill="#1B2B4B" stroke="#1A1814" stroke-width="3" stroke-linejoin="round"/>
  <!-- Buraco redondo inferior na lombada -->
  <circle cx="40" cy="80" r="5" fill="#FBF8F1" stroke="#1A1814" stroke-width="2"/>
  <!-- Etiqueta branca -->
  <rect x="30" y="20" width="20" height="35" fill="#FBF8F1" stroke="#1A1814" stroke-width="2"/>
  <line x1="33" y1="25" x2="47" y2="25" stroke="#1A1814" stroke-width="2"/>
  <line x1="33" y1="30" x2="47" y2="30" stroke="#1A1814" stroke-width="2"/>
  <line x1="33" y1="35" x2="47" y2="35" stroke="#1A1814" stroke-width="2"/>

  <!-- Alavanca de metal asomando no topo -->
  <path d="M 65 12 L 65 5 L 75 5" fill="none" stroke="#B8B0A0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

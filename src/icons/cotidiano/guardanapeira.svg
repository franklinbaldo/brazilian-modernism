<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Base metálica cilíndrica -->
  <rect x="35" y="40" width="30" height="40" rx="3" fill="#B8B0A0" stroke="#1A1814" stroke-width="4"/>

  <!-- Linhas decorativas do metal -->
  <line x1="35" y1="50" x2="65" y2="50" stroke="#1A1814" stroke-width="2"/>
  <line x1="35" y1="70" x2="65" y2="70" stroke="#1A1814" stroke-width="2"/>

  <!-- Guardanapos no topo (Formato em V) -->
  <path d="M 35 40 L 25 15 L 45 40 Z" fill="#FBF8F1" stroke="#1A1814" stroke-width="3" stroke-linejoin="round"/>
  <path d="M 65 40 L 75 15 L 55 40 Z" fill="#FBF8F1" stroke="#1A1814" stroke-width="3" stroke-linejoin="round"/>
  <path d="M 50 40 L 40 20 L 60 20 Z" fill="#FBF8F1" stroke="#1A1814" stroke-width="3" stroke-linejoin="round"/>
</svg>

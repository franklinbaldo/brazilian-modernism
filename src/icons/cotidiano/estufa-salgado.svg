<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Base metálica -->
  <rect x="15" y="70" width="70" height="15" fill="currentColor" />

  <!-- Estrutura de Vidro -->
  <path d="M 15 70 L 25 30 L 75 30 L 85 70 Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>

  <!-- Prateleiras -->
  <line x1="20" y1="50" x2="80" y2="50" stroke="currentColor" stroke-width="3"/>

  <!-- Salgados Nível 1 (baixo) -->
  <circle cx="30" cy="65" r="4" fill="currentColor" />
  <circle cx="45" cy="65" r="4" fill="currentColor" />
  <circle cx="60" cy="65" r="4" fill="currentColor" />
  <circle cx="75" cy="65" r="4" fill="currentColor" />

  <!-- Salgados Nível 2 (cima) -->
  <circle cx="35" cy="45" r="3" fill="currentColor" />
  <circle cx="50" cy="45" r="3" fill="currentColor" />
  <circle cx="65" cy="45" r="3" fill="currentColor" />
</svg>

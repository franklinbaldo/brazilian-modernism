<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cilindro com tampa cônica, 4 pernas. Azul cobogó (#1B2B4B) + detalhe branco linha de soldado -->
  <g fill="#1B2B4B">
    <!-- Legs -->
    <rect x="25" y="60" width="6" height="35" />
    <rect x="35" y="60" width="4" height="30" />
    <rect x="61" y="60" width="4" height="30" />
    <rect x="69" y="60" width="6" height="35" />
    <!-- Crossbars -->
    <rect x="25" y="70" width="50" height="4" />
    <rect x="25" y="85" width="50" height="4" />
    <!-- Tank body -->
    <rect x="20" y="30" width="60" height="35" rx="5" />
    <!-- Tank roof -->
    <path d="M15,30 Q50,10 85,30 Z" />
  </g>
  <!-- White details (linha de soldado) -->
  <rect x="20" y="45" width="60" height="2" fill="white" />
  <rect x="20" y="50" width="60" height="2" fill="white" />
</svg>
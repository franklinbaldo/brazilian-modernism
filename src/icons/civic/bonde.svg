<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Bonde de Santa Teresa amarelo (#D9A441) com detalhes vermelhos (#C8472E), 2 janelas, rodas -->
  <!-- Red roof -->
  <path d="M10,25 Q50,15 90,25 L90,30 L10,30 Z" fill="#C8472E" />
  <rect x="15" y="20" width="70" height="5" fill="#C8472E" />
  <!-- Yellow body -->
  <rect x="15" y="30" width="70" height="40" fill="#D9A441" />
  <!-- Red base -->
  <rect x="15" y="70" width="70" height="10" fill="#C8472E" />
  <!-- Windows -->
  <rect x="25" y="35" width="20" height="25" fill="currentColor" />
  <rect x="55" y="35" width="20" height="25" fill="currentColor" />
  <!-- Wheels -->
  <circle cx="35" cy="85" r="8" fill="currentColor" />
  <circle cx="65" cy="85" r="8" fill="currentColor" />
  <!-- Roof poles -->
  <rect x="48" y="5" width="4" height="15" fill="currentColor" />
  <path d="M20,15 L50,5" stroke="currentColor" stroke-width="2" />
</svg>
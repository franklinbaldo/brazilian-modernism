<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="currentColor">
  <!-- Telhado octogonal cônico + base octogonal + colunas finas -->
  <!-- Base -->
  <polygon points="10,90 90,90 80,75 20,75" />
  <rect x="10" y="90" width="80" height="5" />
  <!-- Columns -->
  <rect x="25" y="45" width="4" height="30" />
  <rect x="48" y="45" width="4" height="30" />
  <rect x="71" y="45" width="4" height="30" />
  <!-- Roof -->
  <polygon points="50,10 95,45 5,45" />
  <rect x="5" y="45" width="90" height="4" />
  <!-- Details -->
  <circle cx="50" cy="5" r="3" />
</svg>
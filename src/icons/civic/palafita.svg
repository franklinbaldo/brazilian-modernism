<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="currentColor">
  <!-- Casa de madeira sobre 4 estacas, telhado duas águas, linha horizontal espelho d'água -->
  <!-- Water -->
  <rect x="5" y="90" width="90" height="2" />
  <rect x="15" y="85" width="70" height="2" />
  <!-- Stilts -->
  <rect x="30" y="60" width="4" height="25" />
  <rect x="43" y="60" width="4" height="25" />
  <rect x="53" y="60" width="4" height="25" />
  <rect x="66" y="60" width="4" height="25" />
  <!-- House base -->
  <rect x="20" y="60" width="60" height="4" />
  <!-- House body -->
  <rect x="25" y="30" width="50" height="30" />
  <!-- Roof -->
  <polygon points="50,10 85,30 15,30" />
  <!-- Window and door -->
  <rect x="35" y="40" width="10" height="10" fill="white" />
  <rect x="55" y="40" width="10" height="20" fill="white" />
</svg>
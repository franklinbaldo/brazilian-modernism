<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="currentColor">
  <!-- Fachada Art Deco -->
  <!-- Base block -->
  <rect x="20" y="50" width="60" height="50" />
  <!-- Step-back 1 -->
  <rect x="30" y="30" width="40" height="20" />
  <!-- Step-back 2 -->
  <rect x="40" y="10" width="20" height="20" />

  <!-- Windows -->
  <rect x="25" y="60" width="10" height="30" fill="none" stroke="currentColor" stroke-width="4"/>
  <rect x="65" y="60" width="10" height="30" fill="none" stroke="currentColor" stroke-width="4"/>
  <rect x="45" y="40" width="10" height="40" fill="none" stroke="currentColor" stroke-width="4"/>
</svg>

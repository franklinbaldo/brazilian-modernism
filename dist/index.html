<!DOCTYPE html><html lang="pt-br"> <head><meta charset="utf-8"><title>Brazilian Modernism Design System</title><style>:root{--color-bg: #F4EFE4;--color-surface: #EAE2CE;--color-accent: #C2281F;--color-azul: #1F6FA8;--color-ouro: #D8A43A;--color-verde: #3F7A4E;--color-text: #17140F;--radius-curve: 2rem;--radius-concrete: 0;--font-modernist: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;--line-height-modern: 1.6;--tracking-caps: .1em}body{background-color:var(--color-bg);color:var(--color-text);font-family:var(--font-modernist);line-height:var(--line-height-modern);margin:0;-webkit-font-smoothing:antialiased}.tracked-caps{text-transform:uppercase;letter-spacing:var(--tracking-caps);font-weight:600;font-size:.85em}.pattern-bulcao-triangles{background-image:linear-gradient(45deg,var(--color-text) 50%,transparent 50%);background-size:40px 40px;opacity:.05}.pattern-bulcao-stripes{background-image:repeating-linear-gradient(45deg,var(--color-text),var(--color-text) 10px,transparent 10px,transparent 20px);opacity:.05}.pattern-bulcao-moons{background-image:radial-gradient(circle at 0% 50%,var(--color-text) 50%,transparent 50%);background-size:40px 40px;opacity:.05}.pattern-container{position:relative;z-index:1}.pattern-container:before{content:"";position:absolute;inset:0;z-index:-1;pointer-events:none}.pattern-container.pattern-triangles:before{background-image:linear-gradient(45deg,var(--color-text) 50%,transparent 50%);background-size:40px 40px;opacity:.05}.pattern-container.pattern-stripes:before{background-image:repeating-linear-gradient(45deg,var(--color-text),var(--color-text) 10px,transparent 10px,transparent 20px);opacity:.05}.pattern-container.pattern-moons:before{background-image:radial-gradient(circle at 0% 50%,var(--color-text) 50%,transparent 50%);background-size:40px 40px;opacity:.05}
</style></head> <body>  <main> <h1>Modernismo Brasileiro</h1> <p>Unificando o ecossistema Franklin Baldo.</p> </main>  </body></html>
